<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub do Conhecimento - Cursos e E-books</title>
  <meta name="description" content="Acesso vitalício a cursos online e e-books práticos. Aprenda no seu ritmo e transforme sua carreira." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #7c3aed;
      --primary-foreground: #ffffff;
      --background: #0f172a;
      --foreground: #f8fafc;
      --card: #1e293b;
      --card-foreground: #f8fafc;
      --border: #334155;
      --muted: #94a3b8;
      --muted-foreground: #cbd5e1;
      --gradient-primary: linear-gradient(135deg, #7c3aed 0%, #4f46e5 50%, #06b6d4 100%);
      --gradient-soft: radial-gradient(circle at 50% 0%, rgba(124, 58, 237, 0.15) 0%, transparent 50%);
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.25);
      --shadow-glow: 0 0 40px rgba(124, 58, 237, 0.3);
      --whatsapp: #25d366;
      --whatsapp-dark: #128c7e;
      --section-divider: rgba(51, 65, 85, 0.4); /* Linha divisória discreta */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--background);
      color: var(--foreground);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(51, 65, 85, 0.6);
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--foreground);
      font-weight: 800;
      font-size: 1.125rem;
      letter-spacing: -0.025em;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--gradient-primary);
    }

    .brand-icon svg {
      width: 18px;
      height: 18px;
      color: var(--primary-foreground);
    }

    .nav-links {
      display: none;
      align-items: center;
      gap: 32px;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--foreground);
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--primary-foreground);
      padding: 10px 20px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .nav-cta:hover {
      opacity: 0.9;
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    /* Hero */
    .hero {
      position: relative;
      padding-top: 140px;
      padding-bottom: 80px;
      overflow: hidden;
      border-bottom: 1px solid var(--section-divider);
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: var(--gradient-soft);
    }

    .hero-blob {
      position: absolute;
      top: -128px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 500px;
      border-radius: 50%;
      background: var(--gradient-primary);
      opacity: 0.25;
      filter: blur(80px);
      z-index: -1;
    }

    .hero-grid {
      display: grid;
      gap: 48px;
      align-items: center;
    }

    @media (min-width: 1024px) {
      .hero-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(124, 58, 237, 0.25);
      background: rgba(124, 58, 237, 0.08);
      color: var(--primary);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .hero h1 {
      margin-top: 24px;
      font-size: 2.5rem;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    @media (min-width: 768px) {
      .hero h1 {
        font-size: 3.75rem;
      }
    }

    .gradient-text {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero p {
      margin-top: 24px;
      font-size: 1.125rem;
      color: var(--muted);
      max-width: 576px;
    }

    .hero strong {
      color: var(--foreground);
    }

    .hero-actions {
      margin-top: 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--gradient-primary);
      color: var(--primary-foreground);
      padding: 16px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow-glow);
      border: none;
      cursor: pointer;
    }

    .btn-primary:hover {
      transform: scale(1.02);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      padding: 16px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .hero-avatars {
      margin-top: 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .avatar-stack {
      display: flex;
    }

    .avatar-stack img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid var(--background);
      object-fit: cover;
      margin-left: -8px;
    }

    .avatar-stack img:first-child {
      margin-left: 0;
    }

    .rating {
      font-size: 0.875rem;
    }

    .stars {
      display: flex;
      gap: 4px;
      color: #f59e0b;
    }

    .hero-image {
      position: relative;
    }

    .hero-image-glow {
      position: absolute;
      inset: -24px;
      background: var(--gradient-primary);
      opacity: 0.35;
      filter: blur(32px);
      border-radius: 24px;
      z-index: -1;
    }

    .hero-image img {
      width: 100%;
      height: auto;
      max-height: 450px;
      object-fit: cover;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--card);
      padding: 8px;
    }

    /* Sections Globais */
    section {
      padding: 96px 0;
      border-bottom: 1px solid var(--section-divider); /* Linha divisória padrão */
    }

    .section-header {
      text-align: center;
      max-width: 640px;
      margin: 0 auto 64px;
    }

    .section-tag {
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--primary);
    }

    .section-title {
      margin-top: 12px;
      font-size: 2.25rem;
      font-weight: 900;
      letter-spacing: -0.025em;
    }

    @media (min-width: 768px) {
      .section-title {
        font-size: 3rem;
      }
    }

    .section-subtitle {
      margin-top: 16px;
      font-size: 1.125rem;
      color: var(--muted);
    }

    /* Logos */
    .logos {
      border-bottom: 1px solid var(--section-divider);
      background: rgba(30, 41, 59, 0.3);
      padding: 32px 0;
    }

    .logos p {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .logos-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px 48px;
      opacity: 0.6;
    }

    .logos-grid span {
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--muted);
    }

    /* Benefits */
    #beneficios {
      background: var(--background);
    }

    .benefits-grid {
      display: grid;
      gap: 24px;
    }

    @media (min-width: 640px) {
      .benefits-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      transition: transform 0.2s, border-color 0.2s;
      box-shadow: var(--shadow-card);
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      border-color: rgba(124, 58, 237, 0.4);
    }

    .benefit-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: var(--gradient-primary);
      color: var(--primary-foreground);
      margin-bottom: 20px;
    }

    .benefit-card h3 {
      font-size: 1.125rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .benefit-card p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* How it works */
    .steps {
      background: rgba(30, 41, 59, 0.4);
    }

    .steps-grid {
      display: grid;
      gap: 32px;
    }

    @media (min-width: 768px) {
      .steps-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .step-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: var(--shadow-card);
    }

    .step-number {
      font-size: 3rem;
      font-weight: 900;
      line-height: 1;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .step-card h3 {
      margin-top: 16px;
      font-size: 1.25rem;
      font-weight: 800;
    }

    .step-card p {
      margin-top: 8px;
      color: var(--muted);
    }

    /* Testimonials */
    #depoimentos {
      background: var(--background);
    }

    .testimonials-grid {
      display: grid;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .testimonials-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .testimonial-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-card);
    }

    .testimonial-card blockquote {
      flex: 1;
      margin-top: 16px;
      font-size: 1rem;
    }

    .testimonial-author {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .testimonial-author img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }

    .testimonial-author strong {
      display: block;
      font-weight: 700;
    }

    .testimonial-author span {
      font-size: 0.875rem;
      color: var(--muted);
    }

    /* Offer */
    #oferta {
      background: rgba(30, 41, 59, 0.2);
    }

    .offer-card {
      display: grid;
      gap: 40px;
      max-width: 1152px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: var(--shadow-glow);
    }

    @media (min-width: 1024px) {
      .offer-card {
        grid-template-columns: 3fr 2fr;
      }
    }

    .offer-content {
      padding: 40px;
    }

    @media (min-width: 768px) {
      .offer-content {
        padding: 56px;
      }
    }

    .offer-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(124, 58, 237, 0.12);
      color: var(--primary);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .offer-content h2 {
      margin-top: 16px;
      font-size: 1.875rem;
      font-weight: 900;
      letter-spacing: -0.025em;
    }

    @media (min-width: 768px) {
      .offer-content h2 {
        font-size: 2.25rem;
      }
    }

    .offer-content > p {
      margin-top: 12px;
      color: var(--muted);
    }

    .offer-list {
      margin-top: 32px;
      display: grid;
      gap: 12px;
    }

    @media (min-width: 640px) {
      .offer-list {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .offer-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.875rem;
    }

    .offer-list svg {
      width: 20px;
      height: 20px;
      color: var(--primary);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .offer-pricing {
      padding: 40px;
      background: var(--gradient-primary);
      color: var
